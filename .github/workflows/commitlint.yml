name: 📝 Commitlint

on: [push, pull_request]

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci --ignore-scripts

      - name: 🔍 Print versions
        run: |
          git --version
          node --version
          npm --version
          npm exec -- commitlint --version

      - name: ✅ Validate current commit (push)
        if: github.event_name == 'push'
        run: npm exec -- commitlint --last --verbose

      - name: 🔎 Validate PR commits
        if: github.event_name == 'pull_request'
        run: npm exec -- commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
